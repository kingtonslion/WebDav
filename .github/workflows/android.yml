name: Android CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Check directory structure
      run: ls -R
     
    - name: Build with Gradle 
      run: | 
         cd WebDAV
         if[ ! -f gradlew ]; 
         then gradle wrapper fi 
         ./gradlew assembleDebug --stacktrace 

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: WebDAV/mobile/build/outputs/apk/debug/*.apk
